<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelir Gider Takibi</title>
    
    <!-- React ve ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        function App() {
            // Aktif sekme
            const [activeTab, setActiveTab] = useState('budget');

            // LocalStorage'dan verileri çek
            const [transactions, setTransactions] = useState(() => {
                try {
                    const saved = localStorage.getItem('expense_tracker_data_html');
                    return saved ? JSON.parse(saved) : [];
                } catch (error) {
                    return [];
                }
            });

            // Yatırımlar için state
            const [investments, setInvestments] = useState(() => {
                try {
                    const saved = localStorage.getItem('investments_data_html');
                    return saved ? JSON.parse(saved) : [];
                } catch (error) {
                    return [];
                }
            });

            // Veriler değiştikçe LocalStorage'a kaydet
            useEffect(() => {
                localStorage.setItem('expense_tracker_data_html', JSON.stringify(transactions));
            }, [transactions]);

            useEffect(() => {
                localStorage.setItem('investments_data_html', JSON.stringify(investments));
            }, [investments]);
            
            // Ay Seçimi
            const getCurrentMonthYear = () => {
                const d = new Date();
                const month = (d.getMonth() + 1).toString().padStart(2, '0');
                return `${d.getFullYear()}-${month}`;
            };
            const [selectedMonth, setSelectedMonth] = useState(getCurrentMonthYear());

            // Form Stateleri
            const [type, setType] = useState('expense');
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState('Market');
            const [description, setDescription] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);

            const expenseCategories = ['Market', 'Fatura', 'Kira', 'Ulaşım', 'Yemek', 'Eğlence', 'Sağlık', 'Kredi Kartı', 'Diğer'];
            const incomeCategories = ['Maaş', 'Prim', 'Yatırım', 'Borç Geri Dönüşü', 'Ek İş', 'Diğer'];

            // Yatırım form stateleri
            const [invType, setInvType] = useState('Hisse Senedi');
            const [invName, setInvName] = useState('');
            const [invQuantity, setInvQuantity] = useState('');
            const [invBuyPrice, setInvBuyPrice] = useState('');
            const [invBuyDate, setInvBuyDate] = useState(new Date().toISOString().split('T')[0]);
            const [invNotes, setInvNotes] = useState('');
            const [editingInvestment, setEditingInvestment] = useState(null);

            // Filtre state'i
            const [filterType, setFilterType] = useState(null); // 'income' veya 'expense'

            // Hesabım ayarları
            const [userEmail, setUserEmail] = useState(() => {
                return localStorage.getItem('user_email') || 'emrecan4778.88@gmail.com';
            });
            const [theme, setTheme] = useState(() => {
                return localStorage.getItem('app_theme') || 'light';
            });
            const [notifications, setNotifications] = useState(() => {
                const saved = localStorage.getItem('notifications_enabled');
                return saved ? JSON.parse(saved) : true;
            });
            const [language, setLanguage] = useState(() => {
                return localStorage.getItem('app_language') || 'tr';
            });

            // Tema değiştiğinde kaydet
            useEffect(() => {
                localStorage.setItem('app_theme', theme);
                if (theme === 'dark') {
                    document.body.classList.add('dark');
                } else {
                    document.body.classList.remove('dark');
                }
            }, [theme]);

            // Bildirim ayarı değiştiğinde kaydet
            useEffect(() => {
                localStorage.setItem('notifications_enabled', JSON.stringify(notifications));
            }, [notifications]);

            // Dil değiştiğinde kaydet
            useEffect(() => {
                localStorage.setItem('app_language', language);
            }, [language]);

            // Şifre değiştirme
            const handlePasswordChange = () => {
                const currentPassword = prompt('Mevcut şifrenizi girin:');
                if (!currentPassword) return;
                
                const newPassword = prompt('Yeni şifrenizi girin:');
                if (!newPassword) return;
                
                const confirmPassword = prompt('Yeni şifrenizi tekrar girin:');
                if (newPassword !== confirmPassword) {
                    alert('Şifreler eşleşmiyor!');
                    return;
                }
                
                // Gerçek uygulamada burada API çağrısı yapılır
                alert('Şifre değiştirme özelliği yakında aktif olacak!');
            };

            const investmentTypes = ['Hisse Senedi', 'Kripto Para', 'Altın', 'Döviz', 'Tahvil', 'Fon', 'Diğer'];

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!amount || isNaN(amount) || Number(amount) <= 0) return;

                const newTransaction = {
                    id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(),
                    type,
                    amount: parseFloat(amount),
                    category,
                    description,
                    date,
                    timestamp: new Date().getTime()
                };

                // State'i hemen güncelle
                setTransactions(prev => [newTransaction, ...prev]);
                
                // Formu temizle
                setAmount('');
                setDescription('');
            };

            const handleDelete = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
            };

            const filteredTransactions = useMemo(() => {
                let filtered = selectedMonth 
                    ? transactions.filter(t => t.date.startsWith(selectedMonth))
                    : transactions;
                
                // Tip filtreleme ekle
                if (filterType) {
                    filtered = filtered.filter(t => t.type === filterType);
                }
                
                return filtered;
            }, [transactions, selectedMonth, filterType]);

            const summary = useMemo(() => {
                const income = filteredTransactions.filter(t => t.type === 'income').reduce((acc, curr) => acc + curr.amount, 0);
                const expense = filteredTransactions.filter(t => t.type === 'expense').reduce((acc, curr) => acc + curr.amount, 0);
                
                // O ayki aktif yatırımların toplamını hesapla
                const monthInvestments = investments.filter(inv => {
                    if (!selectedMonth) return inv.status === 'active';
                    return inv.buyDate.startsWith(selectedMonth) && inv.status === 'active';
                }).reduce((acc, inv) => acc + (inv.quantity * inv.buyPrice), 0);
                
                return { 
                    income, 
                    expense, 
                    monthInvestments,
                    balance: income - expense - monthInvestments 
                };
            }, [filteredTransactions, investments, selectedMonth]);

            const handleTypeChange = (newType) => {
                setType(newType);
                setCategory(newType === 'expense' ? expenseCategories[0] : incomeCategories[0]);
            };

            // Yatırım ekleme/düzenleme fonksiyonu
            const handleInvestmentSubmit = (e) => {
                e.preventDefault();
                if (!invName || !invQuantity || !invBuyPrice || isNaN(invQuantity) || isNaN(invBuyPrice)) return;

                if (editingInvestment) {
                    // Düzenleme modu
                    setInvestments(investments.map(inv => 
                        inv.id === editingInvestment.id
                            ? {
                                ...inv,
                                type: invType,
                                name: invName,
                                quantity: parseFloat(invQuantity),
                                buyPrice: parseFloat(invBuyPrice),
                                buyDate: invBuyDate,
                                notes: invNotes
                            }
                            : inv
                    ));
                    setEditingInvestment(null);
                } else {
                    // Yeni ekleme
                    const newInvestment = {
                        id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(),
                        type: invType,
                        name: invName,
                        quantity: parseFloat(invQuantity),
                        buyPrice: parseFloat(invBuyPrice),
                        buyDate: invBuyDate,
                        notes: invNotes,
                        status: 'active',
                        sellPrice: null,
                        sellDate: null,
                        timestamp: new Date().getTime()
                    };

                    setInvestments([newInvestment, ...investments]);
                }
                
                // Formu temizle
                setInvName('');
                setInvQuantity('');
                setInvBuyPrice('');
                setInvNotes('');
            };

            // Yatırım düzenleme
            const handleEditInvestment = (inv) => {
                setEditingInvestment(inv);
                setInvType(inv.type);
                setInvName(inv.name);
                setInvQuantity(inv.quantity.toString());
                setInvBuyPrice(inv.buyPrice.toString());
                setInvBuyDate(inv.buyDate);
                setInvNotes(inv.notes || '');
                // Forma scroll
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Düzenlemeyi iptal et
            const handleCancelEdit = () => {
                setEditingInvestment(null);
                setInvName('');
                setInvQuantity('');
                setInvBuyPrice('');
                setInvNotes('');
            };

            // Yatırım satma fonksiyonu
            const handleSellInvestment = (id, sellPrice) => {
                const price = prompt('Satış fiyatını girin (adet başına):');
                if (!price || isNaN(price)) return;

                setInvestments(investments.map(inv => 
                    inv.id === id 
                        ? { ...inv, status: 'sold', sellPrice: parseFloat(price), sellDate: new Date().toISOString().split('T')[0] }
                        : inv
                ));
            };

            // Yatırım silme
            const handleDeleteInvestment = (id) => {
                if (confirm('Bu yatırımı silmek istediğinize emin misiniz?')) {
                    setInvestments(investments.filter(inv => inv.id !== id));
                }
            };

            // Verileri dışa aktar
            const handleExportData = () => {
                const data = {
                    transactions,
                    investments,
                    exportDate: new Date().toISOString()
                };
                const dataStr = JSON.stringify(data, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `finans-verileri-${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
            };

            // Verileri içe aktar
            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (confirm('Mevcut verileriniz silinecek ve yeni veriler yüklenecek. Devam etmek istiyor musunuz?')) {
                            if (data.transactions) setTransactions(data.transactions);
                            if (data.investments) setInvestments(data.investments);
                            alert('Veriler başarıyla yüklendi!');
                        }
                    } catch (error) {
                        alert('Dosya okunamadı. Lütfen geçerli bir JSON dosyası seçin.');
                    }
                };
                reader.readAsText(file);
                event.target.value = ''; // Reset input
            };

            // Tüm verileri temizle
            const handleClearAllData = () => {
                if (confirm('TÜM VERİLERİNİZ SİLİNECEK! Bu işlem geri alınamaz. Devam etmek istediğinize emin misiniz?')) {
                    if (confirm('Son kez soruyoruz: Tüm işlemler ve yatırımlar silinecek. Emin misiniz?')) {
                        setTransactions([]);
                        setInvestments([]);
                        alert('Tüm veriler temizlendi.');
                    }
                }
            };

            // Yatırım özeti
            const investmentSummary = useMemo(() => {
                const active = investments.filter(inv => inv.status === 'active');
                const sold = investments.filter(inv => inv.status === 'sold');
                
                const totalInvested = active.reduce((acc, inv) => acc + (inv.quantity * inv.buyPrice), 0);
                
                const totalProfit = sold.reduce((acc, inv) => {
                    const profit = (inv.sellPrice - inv.buyPrice) * inv.quantity;
                    return acc + profit;
                }, 0);

                return { totalInvested, totalProfit, activeCount: active.length, soldCount: sold.length };
            }, [investments]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto space-y-6">
                        
                        {/* Başlık ve Sekmeler */}
                        <div className="flex flex-col gap-4">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-bold text-slate-900">Finans Takip</h1>
                                <p className="text-slate-500 text-sm mt-1">Bütçe ve yatırımlarını yönet</p>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-2">
                                {/* Sekme Butonları */}
                                <div className="flex bg-white rounded-xl border border-slate-200 shadow-sm p-1 overflow-x-auto">
                                    <button
                                        onClick={() => setActiveTab('budget')}
                                        className={`px-4 sm:px-6 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap ${
                                            activeTab === 'budget' 
                                                ? 'bg-blue-500 text-white shadow' 
                                                : 'text-slate-600 hover:text-slate-900'
                                        }`}
                                    >
                                        💰 Bütçe
                                    </button>
                                    <button
                                        onClick={() => setActiveTab('investments')}
                                        className={`px-4 sm:px-6 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap ${
                                            activeTab === 'investments' 
                                                ? 'bg-blue-500 text-white shadow' 
                                                : 'text-slate-600 hover:text-slate-900'
                                        }`}
                                    >
                                        📊 Yatırımlar
                                    </button>
                                    <button
                                        onClick={() => setActiveTab('account')}
                                        className={`px-4 sm:px-6 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap ${
                                            activeTab === 'account' 
                                                ? 'bg-blue-500 text-white shadow' 
                                                : 'text-slate-600 hover:text-slate-900'
                                        }`}
                                    >
                                        ⚙️ Hesabım
                                    </button>
                                </div>

                                {/* Veri Yönetimi Dropdown */}
                                <div className="relative group">
                                    <button className="w-full sm:w-auto px-4 py-2 bg-white rounded-xl border border-slate-200 shadow-sm text-slate-700 hover:bg-slate-50 transition-colors flex items-center justify-center space-x-2">
                                        <span>⚙️</span>
                                        <span className="text-sm font-medium">Veri Yönetimi</span>
                                    </button>
                                    <div className="absolute right-0 mt-2 w-56 bg-white rounded-xl border border-slate-200 shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-10">
                                        <div className="p-2">
                                            <button
                                                onClick={handleExportData}
                                                className="w-full text-left px-4 py-2.5 hover:bg-blue-50 rounded-lg text-sm font-medium text-slate-700 flex items-center space-x-2"
                                            >
                                                <span>📤</span>
                                                <span>Verileri Dışa Aktar</span>
                                            </button>
                                            <label className="w-full text-left px-4 py-2.5 hover:bg-green-50 rounded-lg text-sm font-medium text-slate-700 flex items-center space-x-2 cursor-pointer">
                                                <span>📥</span>
                                                <span>Verileri İçe Aktar</span>
                                                <input
                                                    type="file"
                                                    accept=".json"
                                                    onChange={handleImportData}
                                                    className="hidden"
                                                />
                                            </label>
                                            <div className="border-t border-slate-200 my-2"></div>
                                            <button
                                                onClick={handleClearAllData}
                                                className="w-full text-left px-4 py-2.5 hover:bg-red-50 rounded-lg text-sm font-medium text-red-600 flex items-center space-x-2"
                                            >
                                                <span>🗑️</span>
                                                <span>Tüm Verileri Temizle</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Bütçe Ekranı */}
                        {activeTab === 'budget' && (
                            <>
                                {/* Ay Seçici */}
                                <div className="flex justify-end">
                                    <div className="flex items-center space-x-2 bg-white px-4 py-2.5 rounded-xl border border-slate-200 shadow-sm">
                                        <span>📅</span>
                                        <input
                                            type="month"
                                            value={selectedMonth}
                                            onChange={(e) => setSelectedMonth(e.target.value)}
                                            className="outline-none bg-transparent font-medium text-slate-700 w-full cursor-pointer"
                                        />
                                    </div>
                                </div>

                                {/* Özet Kartları */}
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <button
                                        onClick={() => setFilterType(null)}
                                        className={`bg-white rounded-2xl p-6 shadow-sm border-2 transition-all text-left hover:shadow-md ${
                                            filterType === null ? 'border-blue-400' : 'border-slate-100'
                                        }`}
                                    >
                                        <div className="flex items-center space-x-4">
                                            <div className="p-3 bg-blue-50 text-blue-600 rounded-xl text-2xl">💰</div>
                                            <div>
                                                <p className="text-sm text-slate-500 font-medium">Toplam Bakiye</p>
                                                <h2 className={`text-2xl font-bold ${summary.balance >= 0 ? 'text-slate-900' : 'text-red-600'}`}>
                                                    {summary.balance.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ₺
                                                </h2>
                                            </div>
                                        </div>
                                    </button>
                                    <button
                                        onClick={() => setFilterType('income')}
                                        className={`bg-white rounded-2xl p-6 shadow-sm border-2 transition-all text-left hover:shadow-md ${
                                            filterType === 'income' ? 'border-emerald-400' : 'border-slate-100'
                                        }`}
                                    >
                                        <div className="flex items-center space-x-4">
                                            <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl text-2xl">📈</div>
                                            <div>
                                                <p className="text-sm text-slate-500 font-medium">Toplam Gelir</p>
                                                <h2 className="text-2xl font-bold text-emerald-600">
                                                    {summary.income.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ₺
                                                </h2>
                                            </div>
                                        </div>
                                    </button>
                                    <button
                                        onClick={() => setFilterType('expense')}
                                        className={`bg-white rounded-2xl p-6 shadow-sm border-2 transition-all text-left hover:shadow-md ${
                                            filterType === 'expense' ? 'border-red-400' : 'border-slate-100'
                                        }`}
                                    >
                                        <div className="flex items-center space-x-4">
                                            <div className="p-3 bg-red-50 text-red-600 rounded-xl text-2xl">📉</div>
                                            <div>
                                                <p className="text-sm text-slate-500 font-medium">Toplam Gider</p>
                                                <h2 className="text-2xl font-bold text-red-600">
                                                    {summary.expense.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ₺
                                                </h2>
                                            </div>
                                        </div>
                                    </button>
                                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                                        <div className="flex items-center space-x-4">
                                            <div className="p-3 bg-purple-50 text-purple-600 rounded-xl text-2xl">💎</div>
                                            <div>
                                                <p className="text-sm text-slate-500 font-medium">Aylık Yatırım</p>
                                                <h2 className="text-2xl font-bold text-purple-600">
                                                    {summary.monthInvestments.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ₺
                                                </h2>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    
                                    {/* Form */}
                                    <div className="lg:col-span-1">
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                            <h3 className="text-lg font-semibold mb-4">Yeni İşlem Ekle</h3>
                                            
                                            <div className="flex bg-slate-100 p-1 rounded-xl mb-6">
                                                <button
                                                    onClick={() => handleTypeChange('expense')}
                                                    className={`flex-1 flex items-center justify-center space-x-2 py-2 text-sm font-medium rounded-lg transition-colors ${
                                                        type === 'expense' ? 'bg-white shadow text-red-600' : 'text-slate-500'
                                                    }`}
                                                >
                                                    <span>➖</span> <span>Gider</span>
                                                </button>
                                                <button
                                                    onClick={() => handleTypeChange('income')}
                                                    className={`flex-1 flex items-center justify-center space-x-2 py-2 text-sm font-medium rounded-lg transition-colors ${
                                                        type === 'income' ? 'bg-white shadow text-emerald-600' : 'text-slate-500'
                                                    }`}
                                                >
                                                    <span>➕</span> <span>Gelir</span>
                                                </button>
                                            </div>

                                            <form onSubmit={handleSubmit} className="space-y-4">
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Tutar (₺)</label>
                                                    <input
                                                        type="number" step="0.01" min="0" value={amount}
                                                        onChange={(e) => setAmount(e.target.value)}
                                                        placeholder="0.00" required
                                                        className="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">🏷️ Kategori</label>
                                                    <select
                                                        value={category} onChange={(e) => setCategory(e.target.value)}
                                                        className="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                                    >
                                                        {type === 'expense' 
                                                            ? expenseCategories.map(c => <option key={c} value={c}>{c}</option>)
                                                            : incomeCategories.map(c => <option key={c} value={c}>{c}</option>)
                                                        }
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">📅 Tarih</label>
                                                    <input
                                                        type="date" value={date} onChange={(e) => setDate(e.target.value)} required
                                                        className="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">📝 Açıklama</label>
                                                    <input
                                                        type="text" value={description} onChange={(e) => setDescription(e.target.value)}
                                                        placeholder="Örn: Hafta sonu alışverişi"
                                                        className="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                                <button
                                                    type="submit"
                                                    className={`w-full py-3 rounded-xl text-white font-medium ${
                                                        type === 'expense' ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-500 hover:bg-emerald-600'
                                                    }`}
                                                >
                                                    {type === 'expense' ? 'Gider Ekle' : 'Gelir Ekle'}
                                                </button>
                                            </form>
                                        </div>
                                    </div>

                                    {/* Liste */}
                                    <div className="lg:col-span-2">
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 h-full min-h-[400px]">
                                            <div className="flex items-center justify-between mb-6">
                                                <h3 className="text-lg font-semibold">

                                                className={`p-4 rounded-xl border-2 transition-all ${
                                                    theme === 'dark' 
                                                        ? 'border-blue-500 bg-blue-50' 
                                                        : 'border-slate-200 bg-white hover:bg-slate-50'
                                                }`}
                                            >
                                                <div className="text-center">
                                                    <div className="text-3xl mb-2">🌙</div>
                                                    <p className="font-medium text-slate-900">Karanlık Tema</p>
                                                    <p className="text-xs text-slate-500 mt-1">Gece modu (Yakında)</p>
                                                </div>
                                            </button>
                                        </div>
                                    </div>

                                    {/* Dil */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                        <h3 className="text-lg font-semibold mb-6 flex items-center space-x-2">
                                            <span>🌍</span>
                                            <span>Dil</span>
                                        </h3>
                                        
                                        <div className="space-y-3">
                                            <button
                                                onClick={() => setLanguage('tr')}
                                                className={`w-full flex items-center justify-between p-4 rounded-xl border-2 transition-all ${
                                                    language === 'tr' 
                                                        ? 'border-blue-500 bg-blue-50' 
                                                        : 'border-slate-200 bg-white hover:bg-slate-50'
                                                }`}
                                            >
                                                <div className="flex items-center space-x-3">
                                                    <span className="text-2xl">🇹🇷</span>
                                                    <span className="font-medium text-slate-900">Türkçe</span>
                                                </div>
                                                {language === 'tr' && <span className="text-blue-500">✓</span>}
                                            </button>
                                            
                                            <button
                                                onClick={() => setLanguage('en')}
                                                className={`w-full flex items-center justify-between p-4 rounded-xl border-2 transition-all ${
                                                    language === 'en' 
                                                        ? 'border-blue-500 bg-blue-50' 
                                                        : 'border-slate-200 bg-white hover:bg-slate-50'
                                                }`}
                                            >
                                                <div className="flex items-center space-x-3">
                                                    <span className="text-2xl">🇬🇧</span>
                                                    <div className="text-left">
                                                        <p className="font-medium text-slate-900">English</p>
                                                        <p className="text-xs text-slate-500">Yakında</p>
                                                    </div>
                                                </div>
                                                {language === 'en' && <span className="text-blue-500">✓</span>}
                                            </button>
                                        </div>
                                    </div>

                                    {/* Çıkış Yap */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                        <button
                                            onClick={handleClearAllData}
                                            className="w-full flex items-center justify-center space-x-3 p-4 bg-red-50 hover:bg-red-100 rounded-xl transition-colors border-2 border-red-200 hover:border-red-300"
                                        >
                                            <span className="text-red-600 text-xl">⚠️</span>
                                            <span className="font-bold text-red-600">Tüm Verileri Temizle & Sıfırla</span>
                                        </button>
                                    </div>

                                </div>
                            </>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
